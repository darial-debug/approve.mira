<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>approve.mira</title>
  <style>
    :root {
      --bg: #f4f3ee;          /* warm cream canvas */
      --bg-2: #ffffff;        /* surfaces */
      --bg-3: #ebeae3;        /* nav background */
      --card: #ffffff;
      --card-2: #f7f6f0;
      --dark-card: #16181b;   /* the "focused" black tile */
      --border: #e5e3da;
      --border-2: #d4d2c8;
      --text: #16181b;
      --text-dim: #6b7076;
      --text-faint: #9aa0a6;
      --accent: #d9f03a;      /* neon yellow */
      --accent-dim: #b6cb2a;
      --accent-soft: #d9f03a40;
      --danger: #e15555;
      --ok: #3ba974;
      --warn: #d99a2a;
      --radius: 22px;
      --radius-sm: 14px;
      --shadow: 0 8px 32px rgba(20,22,25,0.06);
      --shadow-card: 0 2px 14px rgba(20,22,25,0.04);
      --shadow-hover: 0 12px 28px rgba(20,22,25,0.10);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--accent);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    /* Yellow frame wrapping the whole app, like the reference */
    .frame {
      min-height: 100vh;
      padding: 14px;
      background: var(--accent);
    }
    .canvas {
      background: var(--bg);
      border-radius: 28px;
      min-height: calc(100vh - 28px);
      padding: 26px 30px 36px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      border: 1px solid #1a1a1a14;
    }

    /* ── Top bar (pill nav, matches reference) ── */
    .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 20px; letter-spacing: -0.4px;
      padding-right: 14px;
    }
    .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
    .pill-nav { display: flex; gap: 4px; background: var(--bg-2); border-radius: 999px; padding: 5px; box-shadow: var(--shadow-card); }
    .pill {
      padding: 9px 18px; border-radius: 999px;
      color: var(--text-dim); font-weight: 500; cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap; border: none; background: transparent; font-size: 13px;
    }
    .pill:hover { color: var(--text); }
    .pill.active { background: var(--accent); color: #0a0b0c; font-weight: 600; }
    .pill .badge { display: inline-block; min-width: 18px; height: 18px; padding: 0 5px; margin-left: 6px; border-radius: 9px; background: var(--bg-3); color: var(--text); font-size: 11px; line-height: 18px; text-align: center; }
    .pill.active .badge { background: #0a0b0c; color: var(--accent); }
    .topbar .spacer { flex: 1; }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--bg-2); border: none;
      color: var(--text); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      position: relative; box-shadow: var(--shadow-card);
    }
    .icon-btn:hover { box-shadow: var(--shadow-hover); }
    .icon-btn .badge-dot { position: absolute; top: 8px; right: 10px; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg-2); }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); color: #0a0b0c;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; cursor: pointer; font-size: 15px;
      box-shadow: var(--shadow-card);
    }
    /* Avatar stack like the reference's people row */
    .avatar-stack { display: inline-flex; }
    .avatar-stack .avatar { margin-left: -10px; border: 3px solid var(--bg); }
    .avatar-stack .avatar:first-child { margin-left: 0; }
    .avatar-sm { width: 32px; height: 32px; font-size: 12px; background: var(--bg-3); color: var(--text); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px; border: none;
      background: var(--bg-2); color: var(--text); cursor: pointer; font-weight: 500;
      transition: all 0.15s ease; font-size: 13px; box-shadow: var(--shadow-card);
    }
    .btn:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #0a0b0c; font-weight: 600; }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-dark { background: var(--dark-card); color: var(--bg-2); }
    .btn-dark:hover { background: #2a2d31; }
    .btn-danger { background: var(--bg-2); color: var(--danger); }
    .btn-danger:hover { background: rgba(225,85,85,0.08); }
    .btn-ghost { background: transparent; box-shadow: none; }
    .btn-ghost:hover { background: var(--bg-3); box-shadow: none; transform: none; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .fab {
      position: fixed; right: 40px; bottom: 40px;
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--dark-card); color: var(--accent); border: none;
      font-size: 28px; cursor: pointer; box-shadow: 0 12px 28px rgba(20,22,25,0.25);
      display: flex; align-items: center; justify-content: center; font-weight: 400;
    }
    .fab:hover { transform: translateY(-2px) scale(1.04); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px;
      transition: all 0.18s ease;
      box-shadow: var(--shadow-card);
    }
    .card-hover { cursor: pointer; }
    .card-hover:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .card-dark { background: var(--dark-card); color: var(--bg-2); }
    .card-dark .card-meta { color: #9aa0a6; }
    .card-row { display: flex; align-items: center; gap: 14px; }
    .card-title { font-weight: 600; font-size: 15px; }
    .card-meta { color: var(--text-dim); font-size: 12px; }
    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 900px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

    /* ── Status chips ── */
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
      border: none;
    }
    .chip-yellow { background: var(--accent); color: #16181b; }
    .chip-green  { background: rgba(59,169,116,0.14); color: var(--ok); }
    .chip-red    { background: rgba(225,85,85,0.14); color: var(--danger); }
    .chip-dim    { background: var(--bg-3); color: var(--text-dim); }
    .card-dark .chip-dim { background: #2a2d31; color: #9aa0a6; }

    /* ── Forms ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
    .input, .select, .textarea {
      width: 100%; padding: 12px 16px; border-radius: 14px;
      background: var(--bg-2); border: 1px solid var(--border); color: var(--text);
      font-family: inherit; font-size: 14px; transition: all 0.15s;
    }
    .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--text); box-shadow: 0 0 0 3px var(--accent-soft); }
    .textarea { resize: vertical; min-height: 90px; }
    .help { font-size: 12px; color: var(--text-faint); margin-top: -8px; margin-bottom: 16px; }
    .error { color: var(--danger); font-size: 13px; margin: 10px 0; }
    .ok { color: var(--ok); font-size: 13px; margin: 10px 0; }

    /* ── Timeline (the showpiece, mirrors the cardiology rail) ── */
    .timeline { position: relative; padding: 36px 0 12px; }
    .timeline-rail {
      position: absolute; top: 56px; left: 24px; right: 24px; height: 2px;
      background: var(--border);
    }
    .timeline-steps { display: flex; align-items: stretch; gap: 18px; position: relative; padding: 0 8px; overflow-x: auto; }
    .timeline-step { flex: 1 0 200px; display: flex; flex-direction: column; align-items: flex-start; gap: 14px; }
    .timeline-node {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--bg-2); border: none;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: var(--text-dim);
      z-index: 1; position: relative; box-shadow: var(--shadow-card);
    }
    .timeline-step.done .timeline-node { background: var(--accent); color: #0a0b0c; }
    .timeline-step.pending .timeline-node { background: var(--dark-card); color: var(--accent); box-shadow: 0 0 0 6px var(--accent-soft), var(--shadow-card); }
    .timeline-step.declined .timeline-node { background: var(--danger); color: #ffffff; }
    .timeline-step.sent_back .timeline-node { background: var(--warn); color: #ffffff; }
    .timeline-card {
      width: 100%; padding: 14px 16px;
      background: var(--card-2); border: none;
      border-radius: var(--radius-sm); box-shadow: var(--shadow-card);
    }
    .timeline-step.pending .timeline-card { background: var(--dark-card); color: var(--bg-2); }
    .timeline-step.pending .timeline-card .card-meta { color: #9aa0a6; }

    /* ── Modal / drawer ── */
    .scrim { position: fixed; inset: 0; background: rgba(20,22,25,0.45); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal { width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; background: var(--bg-2); border-radius: var(--radius); padding: 28px; box-shadow: 0 30px 80px rgba(20,22,25,0.20); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal h2 { margin: 0; font-size: 20px; font-weight: 600; }
    .modal .close { background: transparent; border: none; color: var(--text-dim); font-size: 28px; cursor: pointer; padding: 0; line-height: 1; }
    .modal .close:hover { color: var(--text); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty h3 { color: var(--text); margin-bottom: 8px; }

    /* ── Login ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px; background: var(--accent); }
    .login-card { width: 100%; max-width: 440px; background: var(--bg-2); border-radius: 28px; padding: 40px; box-shadow: 0 30px 80px rgba(20,22,25,0.15); }
    .login-card h1 { margin: 0 0 6px; font-size: 30px; letter-spacing: -0.5px; }
    .login-card .sub { color: var(--text-dim); margin-bottom: 28px; }

    /* ── File chips ── */
    .file-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--card-2); border-radius: 12px; margin-bottom: 8px; }
    .file-row .name { flex: 1; font-size: 13px; font-weight: 500; }
    .file-row .size { font-size: 11px; color: var(--text-dim); }

    /* ── Approval-path builder ── */
    .step-builder { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .step-builder-row { display: flex; gap: 10px; align-items: center; }
    .step-builder-row .num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #0a0b0c; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .step-builder-row .select { flex: 1; }
    .step-builder-row .rm { width: 36px; height: 36px; border-radius: 10px; border: none; background: var(--card-2); color: var(--text-dim); cursor: pointer; font-size: 18px; line-height: 1; }
    .step-builder-row .rm:hover { color: var(--danger); background: rgba(225,85,85,0.10); }

    /* ── Misc ── */
    a { color: var(--text); text-decoration: underline; text-decoration-color: var(--accent); text-decoration-thickness: 2px; text-underline-offset: 3px; }
    a:hover { text-decoration-color: var(--text); }
    .hr { height: 1px; background: var(--border); margin: 18px 0; }
    .kv { display: grid; grid-template-columns: 130px 1fr; gap: 8px 16px; font-size: 13px; }
    .kv .k { color: var(--text-dim); }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 14px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    .table th { font-weight: 600; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-2); }
    .table tbody tr:hover { background: var(--card-2); }
    .mono { font-family: 'SF Mono', ui-monospace, monospace; font-size: 12px; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .copy-pill { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; background: var(--card-2); font-family: 'SF Mono', monospace; font-size: 13px; cursor: pointer; }
    .copy-pill:hover { background: var(--accent); }

    /* ── Drawer for profile ── */
    .drawer { position: fixed; top: 14px; right: 14px; bottom: 14px; width: 440px; max-width: calc(100vw - 28px); background: var(--bg-2); border-radius: 24px; padding: 32px; overflow-y: auto; z-index: 99; box-shadow: -20px 30px 60px rgba(20,22,25,0.18); }
    .drawer h2 { margin: 0 0 18px; font-size: 20px; }
    .drawer-section { padding: 18px 0; border-bottom: 1px solid var(--border); }
    .drawer-section:last-of-type { border-bottom: none; }
    .drawer-section h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; margin: 0 0 12px; font-weight: 600; }

    /* Spinner */
    .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state on light bg */
    .empty { text-align: center; padding: 80px 20px; color: var(--text-dim); }
    .empty h3 { color: var(--text); margin-bottom: 8px; font-size: 18px; }

    /* Stat tile (admin big numbers, like the vitals cards) */
    .stat-tile { background: var(--card); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-card); }
    .stat-tile .label { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
    .stat-tile .value { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-tile.accent { background: var(--accent); }
    .stat-tile.dark { background: var(--dark-card); color: var(--bg-2); }
    .stat-tile.dark .label { color: #9aa0a6; }

    /* ── Filter bar ── */
    .filters-bar { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; padding: 14px 16px; background: var(--bg-2); border-radius: var(--radius); margin-bottom: 16px; box-shadow: var(--shadow-card); }
    .filter-field { display: flex; flex-direction: column; gap: 4px; min-width: 150px; flex: 1; }
    .filter-field label { font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-field .select, .filter-field .input { padding: 8px 12px; font-size: 13px; }
    .filter-dates { min-width: 240px; }
    .filter-dates-row { display: flex; gap: 6px; }
    .filter-dates-row .input { flex: 1; min-width: 0; }
    .filters-clear { font-size: 12px; padding: 8px 14px; }

    /* ── List summary ── */
    .list-summary { display: flex; align-items: baseline; justify-content: space-between; gap: 20px; padding: 4px 4px 14px; flex-wrap: wrap; }
    .list-summary .count { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
    .list-summary .count span { font-size: 13px; color: var(--text-dim); margin-left: 8px; font-weight: 500; }
    .list-summary .totals { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
    .list-summary .totals-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

    /* ── Redesigned task card ── */
    .task-card { display: flex; align-items: stretch; gap: 18px; padding: 18px 22px; }
    .task-card-main { flex: 1; min-width: 0; cursor: pointer; }
    .task-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .task-card-title { font-weight: 600; font-size: 16px; letter-spacing: -0.2px; margin-bottom: 4px; }
    .task-card-desc { font-size: 13px; color: var(--text-dim); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .task-card-side { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 10px; min-width: 130px; }
    .task-card-amount { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.1; }
    .task-card-amount .cur { font-size: 12px; color: var(--text-dim); margin-left: 5px; font-weight: 500; }
    .task-card-amount.empty { font-size: 13px; color: var(--text-dim); font-weight: 500; }
    .btn-approve { padding: 9px 18px; border-radius: 999px; border: none; background: var(--accent); color: #0a0b0c; cursor: pointer; font-weight: 600; font-size: 13px; box-shadow: var(--shadow-card); transition: all 0.15s ease; }
    .btn-approve:hover:not(:disabled) { background: var(--accent-dim); transform: translateY(-1px); }
    .btn-approve:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── New page (mode picker, headers, mode cards) ── */
    .new-page-header { margin-bottom: 22px; }
    .new-page-header h1 { margin: 0 0 6px; font-size: 26px; letter-spacing: -0.4px; }
    .mode-pick { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 720px) { .mode-pick { grid-template-columns: 1fr; } }
    .mode-card { background: var(--card); border-radius: var(--radius); padding: 28px 24px; cursor: pointer; box-shadow: var(--shadow-card); transition: all 0.18s ease; }
    .mode-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border: 1px solid var(--accent); }
    .mode-card .mode-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); color: #0a0b0c; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; margin-bottom: 14px; }
    .mode-card h3 { margin: 0 0 6px; font-size: 17px; }
    .mode-card p { margin: 0; color: var(--text-dim); font-size: 13px; }

    /* ── Workflow steps pill row ── */
    .workflow-steps { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
    .workflow-step { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px; background: var(--bg-3); color: var(--text-dim); font-size: 12px; font-weight: 600; }
    .workflow-step .num { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-2); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; box-shadow: var(--shadow-card); }
    .workflow-step.active { background: var(--accent); color: #0a0b0c; }
    .workflow-step.active .num { background: #0a0b0c; color: var(--accent); }
    .workflow-step.done { background: var(--dark-card); color: var(--bg-2); }
    .workflow-step.done .num { background: var(--accent); color: #0a0b0c; }

    /* ── Form sections + dark action bar ── */
    .form-section-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; margin: 20px 0 12px; padding-top: 10px; border-top: 1px solid var(--border); }
    .form-section-title:first-of-type { padding-top: 0; border-top: none; margin-top: 6px; }
    .form-actions { margin-top: 24px; background: var(--dark-card); color: var(--bg-2); padding: 18px 22px; border-radius: var(--radius); }
    .form-actions .actions-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .form-actions .actions-hint { flex: 1; min-width: 220px; color: #cfd2d6; font-size: 13px; margin: 0; }
    .form-actions .actions-hint strong { color: var(--accent); font-weight: 700; }
    .submit-status { padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
    .submit-status.locked { background: #2a2d31; color: #9aa0a6; }
    .submit-status.ready { background: var(--accent); color: #0a0b0c; }
    .form-actions .btn { background: var(--bg-2); color: var(--text); }

    /* ── AI advisory feedback blocks ── */
    .ai-feedback { padding: 14px 16px; border-radius: var(--radius-sm); margin-bottom: 10px; font-size: 13px; }
    .ai-feedback b { display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .ai-feedback ul { margin: 6px 0 0; padding-left: 20px; }
    .ai-feedback.required { background: rgba(225,85,85,0.08); color: var(--danger); }
    .ai-feedback.suggestions { background: var(--card-2); color: var(--text); }
    .ai-feedback.ok-panel { background: rgba(59,169,116,0.10); color: var(--ok); }
    .ai-checking { background: var(--card-2); padding: 18px; border-radius: var(--radius-sm); text-align: center; margin-top: 14px; }

    /* ── AI chat thread bubbles ── */
    .ai-chat-thread { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .chat-bubble { padding: 12px 16px; border-radius: 16px; max-width: 80%; font-size: 13.5px; line-height: 1.5; }
    .chat-bubble.user { background: var(--accent); color: #0a0b0c; align-self: flex-end; border-bottom-right-radius: 6px; }
    .chat-bubble.ai { background: var(--dark-card); color: var(--bg-2); align-self: flex-start; border-bottom-left-radius: 6px; }
    .chat-bubble .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
  // ────────────────────────────────────────────────────────────────────
  // approve.mira — single-page client
  // ────────────────────────────────────────────────────────────────────

  const TOKEN_KEY = 'approve.mira.token';
  const state = {
    user: null,
    users: [],
    departments: [],
    projects: [],
    tasks: [],
    drafts: [],
    inbox: [],
    unread: 0,
    analytics: null,
    route: parseRoute(),
    scope: 'pending',        // pending | submitted | history | new | all
    newCreationMode: null,   // null | 'manual' | 'ai' (only when scope==='new')
    pendingCount: 0,
    filters: {
      business: '',
      departmentId: '',
      submitterId: '',
      country: '',
      dateFrom: '',
      dateTo: '',
      paymentType: '',
    },
    drawerOpen: false,
    modalOpen: null,         // 'admin-user' only now
    flash: null,
  };

  function parseRoute() {
    const hash = window.location.hash.replace(/^#/, '') || '/';
    const [path, queryStr] = hash.split('?');
    const query = Object.fromEntries(new URLSearchParams(queryStr || ''));
    const segs = path.split('/').filter(Boolean);
    return { path, segs, query };
  }
  window.addEventListener('hashchange', () => {
    state.route = parseRoute();
    if (state.route.path.startsWith('/new')) {
      openNewFromRoute();
    } else {
      state.modalOpen = null;
      render();
    }
  });

  function openNewFromRoute() {
    state.scope = 'new';
    state.newCreationMode = 'ai';
    const draftId = state.route.query.draft;
    resetAI();
    resetManual();
    if (draftId) {
      const draft = (state.drafts || []).find((d) => d.id === draftId);
      if (draft) {
        _ai.sourceDraft = draft;
        _ai.draftId = draft.id;
      }
    }
    state.modalOpen = null;
    render();
  }

  function nav(to) {
    window.location.hash = to;
  }

  // ─── API ───
  async function api(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    const token = localStorage.getItem(TOKEN_KEY);
    if (token) headers.Authorization = 'Bearer ' + token;
    const res = await fetch(path, { ...options, headers, body: options.body ? JSON.stringify(options.body) : undefined });
    const text = await res.text();
    let data; try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text }; }
    if (!res.ok) throw new Error(data.error || res.statusText);
    return data;
  }
  async function apiRaw(path, opts) {
    const token = localStorage.getItem(TOKEN_KEY);
    return fetch(path, { ...opts, headers: { ...(opts?.headers || {}), Authorization: 'Bearer ' + token } });
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    state.user = null;
    nav('/');
    render();
  }

  // ─── Helpers ───
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }) : '';
  const fmtAgo = (iso) => {
    if (!iso) return '';
    const ms = Date.now() - new Date(iso).getTime();
    const m = Math.round(ms / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.round(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.round(h / 24)}d ago`;
  };
  const fmtDuration = (ms) => {
    if (!ms || ms < 0) return '—';
    const m = Math.round(ms / 60000);
    if (m < 60) return `${m}m`;
    const h = m / 60;
    if (h < 48) return `${h.toFixed(1)}h`;
    return `${Math.round(h / 24)}d`;
  };
  const userById = (id) => state.users.find((u) => u.id === id);
  const userName = (id) => userById(id)?.name || '—';
  const roleLabel = (r) => ({ employee: 'Employee', manager: 'Manager', dept_head: 'Dept Head', c_level: 'C-Level', admin: 'Admin' }[r] || r);
  const categoryLabel = (c) => ({ payments: 'Payments', content: 'Content', other: 'Other' }[c] || c);

  function statusChip(t) {
    if (t.status === 'approved') return `<span class="chip chip-green">Approved</span>`;
    if (t.status === 'declined') return `<span class="chip chip-red">Declined</span>`;
    if (t.status === 'awaiting_transfer') return `<span class="chip chip-yellow" style="background: var(--warn); color: #1a1a1a;">Awaiting transfer</span>`;
    if (t.status === 'transferred') return `<span class="chip chip-green">Transferred ✓</span>`;
    return `<span class="chip chip-yellow">Under review</span>`;
  }

  // ─── Boot ───
  async function boot() {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { render(); return; }
    try {
      const me = await api('/api/me');
      state.user = me.user;
      state.unread = me.unread;
      state.inbox = me.inbox || [];
      await refreshAll();
      // If the URL came in pointing at /new (e.g. from a Slack draft link), open it now that drafts are loaded.
      if (state.route.path.startsWith('/new')) openNewFromRoute();
    } catch {
      localStorage.removeItem(TOKEN_KEY);
    }
    render();
  }

  async function refreshAll() {
    // For the list scopes we send a real scope; for the New tab we don't fetch tasks for it.
    const isExec = state.user?.role === 'admin' || state.user?.role === 'c_level';
    const scopeParam = state.scope === 'new' ? null
      : (state.scope === 'all' && !isExec ? 'history' : state.scope);
    const [tasks, pendingRes, users, departments, projects, drafts] = await Promise.all([
      scopeParam ? api('/api/tasks?scope=' + scopeParam).catch(() => ({ tasks: [] })) : Promise.resolve({ tasks: [] }),
      api('/api/tasks?scope=pending').catch(() => ({ tasks: [] })),
      api('/api/users').catch(() => ({ users: [] })),
      api('/api/departments').catch(() => ({ departments: [] })),
      api('/api/projects').catch(() => ({ projects: [] })),
      api('/api/task-drafts').catch(() => ({ drafts: [] })),
    ]);
    state.tasks = tasks.tasks || [];
    state.pendingCount = (pendingRes.tasks || []).length;
    state.users = users.users || [];
    state.departments = departments.departments || [];
    state.projects = projects.projects || [];
    state.drafts = drafts.drafts || [];
    if (isExec) {
      api('/api/analytics').then((a) => { state.analytics = a; render(); }).catch(() => {});
    }
  }

  // ─── Helpers: project, finance, filters, summary, list math ──────────────
  function projectLabel(t) {
    const f = t.fields || {};
    if (f.projectId) return state.projects.find((p) => p.id === f.projectId)?.name || f.projectName || '—';
    return f.projectName || '';
  }
  function taskBusinessKey(t) {
    const f = t.fields || {};
    if (f.projectId) return 'id:' + f.projectId;
    if (f.projectName) return 'name:' + f.projectName;
    return '';
  }
  function submitterDepartmentId(t) {
    return state.users.find((x) => x.id === t.submitterId)?.departmentId || '';
  }
  function submitterDeptName(t) {
    const id = submitterDepartmentId(t);
    if (!id) return '';
    return state.departments.find((d) => d.id === id)?.name || '';
  }
  function applyTaskFilters(list) {
    const f = state.filters;
    return list.filter((t) => {
      if (f.business && taskBusinessKey(t) !== f.business) return false;
      if (f.departmentId && submitterDepartmentId(t) !== f.departmentId) return false;
      if (f.submitterId && t.submitterId !== f.submitterId) return false;
      if (f.country && (t.fields?.country || '') !== f.country) return false;
      if (f.paymentType) {
        if (t.category !== 'payments') return false;
        if ((t.fields?.paymentType || 'payment') !== f.paymentType) return false;
      }
      if (f.dateFrom && new Date(t.createdAt) < new Date(f.dateFrom + 'T00:00:00')) return false;
      if (f.dateTo && new Date(t.createdAt) > new Date(f.dateTo + 'T23:59:59.999')) return false;
      return true;
    });
  }
  function filterOptionsFromTasks(list) {
    const countries = new Set();
    list.forEach((t) => { if (t.fields?.country) countries.add(t.fields.country); });
    return { countries: [...countries].sort() };
  }
  function clearFilters() {
    state.filters = { business: '', departmentId: '', submitterId: '', country: '', dateFrom: '', dateTo: '', paymentType: '' };
  }
  function isFinanceMember() {
    if (!state.user) return false;
    if (state.user.role === 'admin') return true;
    if (!state.user.departmentId) return false;
    const dept = state.departments.find((d) => d.id === state.user.departmentId);
    return !!dept && /finance/i.test(dept.name);
  }
  const paymentTypeLabel = (t) => ({ payment: 'Payment', refund: 'Refund', postpayment: 'Postpayment' }[t] || t);

  const CLOSED_STATUSES = new Set(['approved', 'declined', 'transferred']);
  function isTaskClosed(t) { return CLOSED_STATUSES.has(t.status); }
  function fmtHoursWaiting(t) {
    const iso = t.updatedAt || t.createdAt;
    if (!iso || isTaskClosed(t)) return '';
    const h = (Date.now() - new Date(iso).getTime()) / 3600000;
    if (h < 1) return '<1h waiting';
    if (h < 24) return `${Math.floor(h)}h waiting`;
    return `${Math.floor(h / 24)}d waiting`;
  }
  function currentStageLabel(t) {
    if (isTaskClosed(t)) return '';
    if (t.status === 'awaiting_transfer') return 'Finance · transfer';
    const step = t.steps.find((s) => s.status === 'pending');
    if (!step) return t.status === 'under_review' ? 'Under review' : '';
    const who = step.approverId === state.user?.id ? 'You' : userName(step.approverId);
    return `Step ${step.stepNumber}/${t.steps.length} · ${who}`;
  }
  function taskDescription(t) {
    return ((t.fields?.description || t.fields?.purpose) || '').trim() || 'No description';
  }
  function computeListSummary(tasks) {
    const totals = {};
    tasks.forEach((t) => {
      if (t.category === 'payments' && t.fields?.amount != null) {
        const n = Number(t.fields.amount);
        if (Number.isFinite(n)) {
          const cur = t.fields.currency || '—';
          totals[cur] = (totals[cur] || 0) + n;
        }
      }
    });
    const totalsStr = Object.entries(totals)
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([cur, sum]) => `${sum.toLocaleString(undefined, { maximumFractionDigits: 2 })} ${cur}`)
      .join(' · ');
    return { count: tasks.length, totalsStr };
  }

  // ─── Render top-level ───
  function render() {
    const root = document.getElementById('root');
    if (!state.user) {
      root.innerHTML = renderLogin();
      bindLogin();
      return;
    }
    root.innerHTML = `
      <div class="frame">
        <div class="canvas">
          ${renderTopbar()}
          ${renderRoute()}
          ${state.modalOpen === 'admin-user' ? renderAdminUserModal() : ''}
          ${state.drawerOpen ? renderDrawer() : ''}
          ${state.flash ? `<div class="scrim" id="flashScrim"><div class="modal" style="max-width:420px">${state.flash}<div class="modal-footer"><button class="btn btn-primary" id="flashOk">OK</button></div></div></div>` : ''}
        </div>
      </div>`;
    bindMain();
  }

  // ─── Login screen ───
  function renderLogin() {
    const firstSetup = state.route.query.setup === '1';
    return `
      <div class="login-wrap">
        <div class="login-card">
          <h1><span style="color: var(--accent)">approve</span>.mira</h1>
          <p class="sub">${firstSetup ? 'Set up the first admin (must be daria.l@miracreative.ae).' : 'Sign in with your email and passcode.'}</p>
          <div class="field"><label>Email</label><input class="input" id="email" type="email" /></div>
          ${firstSetup ? '<div class="field"><label>Your name</label><input class="input" id="name" /></div>' : ''}
          <div class="field"><label>Passcode (4–8 digits)</label><input class="input" id="passcode" type="password" inputmode="numeric" maxlength="8" /></div>
          <div class="error" id="loginError" style="display:none"></div>
          <button class="btn btn-primary" id="loginBtn" style="width:100%; padding: 12px 18px;">${firstSetup ? 'Create admin' : 'Sign in'}</button>
          <p class="sub" style="margin-top: 20px; font-size: 12px;">${firstSetup
            ? `<a href="#/">← Back to sign in</a>`
            : `First time setting up? <a href="#/?setup=1">Initialize first admin →</a>`}</p>
        </div>
      </div>`;
  }
  function bindLogin() {
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    btn.onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const passcode = document.getElementById('passcode').value.trim();
      const firstSetup = state.route.query.setup === '1';
      const name = firstSetup ? document.getElementById('name')?.value.trim() : undefined;
      errEl.style.display = 'none';
      try {
        const r = await api('/api/login', { method: 'POST', body: { email, passcode, firstSetup, name } });
        localStorage.setItem(TOKEN_KEY, r.token);
        state.user = r.user;
        nav('/');
        await refreshAll();
        render();
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    };
  }

  // ─── Topbar ───
  function renderTopbar() {
    const isAdmin = state.user.role === 'admin';
    const pending = state.pendingCount;
    return `
      <div class="topbar">
        <div class="brand"><span class="dot"></span>approve.mira</div>
        <div class="pill-nav">
          <button class="pill ${state.scope === 'pending' ? 'active' : ''}" data-scope="pending">For me${pending ? `<span class="badge">${pending}</span>` : ''}</button>
          <button class="pill ${state.scope === 'submitted' ? 'active' : ''}" data-scope="submitted">Submitted</button>
          <button class="pill ${state.scope === 'history' ? 'active' : ''}" data-scope="history">History</button>
          <button class="pill ${state.scope === 'new' ? 'active' : ''}" data-scope="new">New</button>
          ${isAdmin ? `<button class="pill ${state.route.path === '/admin' ? 'active' : ''}" id="navAdmin">Admin</button>` : ''}
        </div>
        <div class="spacer"></div>
        ${state.route.path.startsWith('/task/') || state.route.path === '/admin' ? `<button class="pill" id="backHome">← Home</button>` : ''}
        <button class="icon-btn" id="bellBtn" title="Notifications">${bellSvg()}${state.unread ? '<span class="badge-dot"></span>' : ''}</button>
        <div class="avatar" id="profileBtn" title="Profile">${esc((state.user.name || '?').slice(0,1).toUpperCase())}</div>
      </div>`;
  }
  const bellSvg = () => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2v1h16v-1z"/><path d="M10 21h4"/></svg>`;

  function renderRoute() {
    if (state.route.segs[0] === 'task') return renderTaskDetail(state.route.segs[1]);
    if (state.route.path === '/admin') return renderAdmin();
    if (state.scope === 'new') return renderNewPage();
    return renderHome();
  }

  // ─── Filters bar ───
  function renderFiltersBar(tasksForOptions) {
    const f = state.filters;
    const opts = filterOptionsFromTasks(tasksForOptions);
    const businessOpts = state.projects.map((p) => ({ value: 'id:' + p.id, label: p.name }));
    const submitters = [...new Set(tasksForOptions.map((t) => t.submitterId))]
      .map((id) => state.users.find((u) => u.id === id))
      .filter(Boolean)
      .sort((a, b) => a.name.localeCompare(b.name));
    const hasFilters = Object.values(f).some(Boolean);
    return `
      <div class="filters-bar">
        <div class="filter-field">
          <label>Business</label>
          <select class="select filter-ctrl" data-filter="business">
            <option value="">All businesses</option>
            ${businessOpts.map((o) => `<option value="${esc(o.value)}" ${f.business === o.value ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field">
          <label>Department</label>
          <select class="select filter-ctrl" data-filter="departmentId">
            <option value="">All departments</option>
            ${state.departments.map((d) => `<option value="${d.id}" ${f.departmentId === d.id ? 'selected' : ''}>${esc(d.name)}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field">
          <label>From</label>
          <select class="select filter-ctrl" data-filter="submitterId">
            <option value="">Anyone</option>
            ${submitters.map((u) => `<option value="${u.id}" ${f.submitterId === u.id ? 'selected' : ''}>${esc(u.name)}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field">
          <label>Country</label>
          <select class="select filter-ctrl" data-filter="country">
            <option value="">All countries</option>
            ${opts.countries.map((c) => `<option value="${esc(c)}" ${f.country === c ? 'selected' : ''}>${esc(c)}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field filter-dates">
          <label>Created</label>
          <div class="filter-dates-row">
            <input class="input filter-ctrl" type="date" data-filter="dateFrom" value="${esc(f.dateFrom)}" title="From" />
            <input class="input filter-ctrl" type="date" data-filter="dateTo" value="${esc(f.dateTo)}" title="To" />
          </div>
        </div>
        <div class="filter-field">
          <label>Payment type</label>
          <select class="select filter-ctrl" data-filter="paymentType">
            <option value="">All types</option>
            <option value="payment" ${f.paymentType === 'payment' ? 'selected' : ''}>Payment</option>
            <option value="postpayment" ${f.paymentType === 'postpayment' ? 'selected' : ''}>Postpayment</option>
            <option value="refund" ${f.paymentType === 'refund' ? 'selected' : ''}>Refund</option>
          </select>
        </div>
        ${hasFilters ? `<button class="btn btn-ghost filters-clear" id="clearFiltersBtn" type="button">Clear filters</button>` : ''}
      </div>`;
  }

  // ─── Home: task list with filters + summary ───
  function renderHome() {
    const filteredTasks = applyTaskFilters(state.tasks);
    const hasAnyTasks = state.tasks.length > 0;
    const scopeHint = {
      pending: 'No approvals waiting on you.',
      submitted: 'No active tasks you submitted or are involved in.',
      history: 'No tasks in your history yet.',
      all: 'No tasks across the company yet.',
    }[state.scope] || '';

    let html = '';
    if (hasAnyTasks) html += renderFiltersBar(state.tasks);

    if (!filteredTasks.length) {
      const filterNote = Object.values(state.filters).some(Boolean) ? ' Try adjusting the filters.' : '';
      html += `<div class="empty"><h3>Nothing here yet</h3><p>${scopeHint}${filterNote} Open the <b>New</b> tab to create an approval, or send a message from Slack.</p></div>`;
      return html;
    }

    html += renderListSummary(filteredTasks);
    html += `<div class="grid" style="gap: 12px;">${filteredTasks.map((t) => renderTaskCard(t)).join('')}</div>`;
    return html;
  }

  function renderListSummary(tasks) {
    const { count, totalsStr } = computeListSummary(tasks);
    const nLabel = count === 1 ? 'request' : 'requests';
    return `
      <div class="list-summary">
        <div class="count">${count}<span>${nLabel}</span></div>
        ${totalsStr ? `<div class="totals"><span class="totals-label">Total</span>${esc(totalsStr)}</div>` : ''}
      </div>`;
  }

  function renderTaskCard(t) {
    const step = t.steps.find((s) => s.status === 'pending');
    const canQuickApprove = state.scope === 'pending' && t.status === 'under_review' && step?.approverId === state.user?.id;
    const business = projectLabel(t);
    const dept = submitterDeptName(t);
    const waiting = fmtHoursWaiting(t);
    const stage = currentStageLabel(t);
    const closed = isTaskClosed(t);
    const desc = taskDescription(t);
    const isPayment = t.category === 'payments' && t.fields?.amount != null && Number.isFinite(Number(t.fields.amount));
    const amountBlock = isPayment
      ? `<div class="task-card-amount">${Number(t.fields.amount).toLocaleString(undefined, { maximumFractionDigits: 2 })}<span class="cur">${esc(t.fields.currency || '')}</span></div>`
      : `<div class="task-card-amount empty">${esc(categoryLabel(t.category))}</div>`;

    const tags = [];
    if (business) tags.push(`<span class="chip chip-dim">${esc(business)}</span>`);
    if (dept) tags.push(`<span class="chip chip-dim">${esc(dept)}</span>`);
    if (!closed && waiting) tags.push(`<span class="chip chip-yellow">${esc(waiting)}</span>`);
    if (!closed && stage) tags.push(`<span class="chip chip-dim">${esc(stage)}</span>`);
    if (closed) tags.push(statusChip(t));
    if (t.category === 'payments' && t.fields?.paymentType && t.fields.paymentType !== 'payment') {
      tags.push(`<span class="chip chip-dim">${paymentTypeLabel(t.fields.paymentType)}</span>`);
    }

    return `
      <div class="card task-card">
        <div class="task-card-main" data-open-task="${esc(t.id)}">
          <div class="task-card-tags">${tags.join('')}</div>
          <div class="task-card-title">${esc(t.title)}</div>
          <div class="task-card-desc">${esc(desc)}</div>
        </div>
        <div class="task-card-side">
          ${amountBlock}
          ${canQuickApprove ? `<button type="button" class="btn-approve" data-quick-approve="${esc(t.id)}">Approve</button>` : ''}
        </div>
      </div>`;
  }

  // ─── Task detail ───
  let _taskCache = {};
  async function loadTaskDetail(id) {
    try {
      const r = await api('/api/tasks/' + id);
      _taskCache[id] = r;
      render();
    } catch (e) {
      _taskCache[id] = { error: e.message };
      render();
    }
  }
  function renderTaskDetail(id) {
    const cached = _taskCache[id];
    if (!cached) { loadTaskDetail(id); return `<div class="empty"><span class="spin"></span> Loading…</div>`; }
    if (cached.error) return `<div class="error">${esc(cached.error)}</div>`;
    const t = cached.task;
    const audit = cached.audit || [];
    const submitter = userName(t.submitterId);
    const currentStep = t.steps.find((s) => s.status === 'pending');
    const isMyStep = currentStep && currentStep.approverId === state.user.id && t.status === 'under_review';
    const isSubmitter = t.submitterId === state.user.id;
    const canEditPath = ['dept_head', 'c_level', 'admin'].includes(state.user.role);
    const completedSteps = t.steps.filter((s) => s.status !== 'pending');

    return `
      <div class="grid" style="gap:18px;">
        <div class="card-row" style="gap:14px; flex-wrap: wrap;">
          ${statusChip(t)}
          <span class="chip chip-dim">${categoryLabel(t.category)}</span>
          ${t.source === 'slack' ? `<span class="chip chip-dim">From Slack</span>` : ''}
        </div>
        <h1 style="margin:0; font-size: 26px; letter-spacing:-0.4px;">${esc(t.title)}</h1>
        <div class="card-meta">Submitted by <b>${esc(submitter)}</b> · ${fmtDate(t.createdAt)}</div>

        ${renderTimeline(t)}

        ${isMyStep ? renderActionPanel(t, currentStep) : ''}
        ${t.status === 'declined' && isSubmitter ? `<div class="card"><b>This task was declined.</b> You can edit it and resubmit.<div style="margin-top:10px;"><button class="btn btn-primary" id="resubmitBtn">Resubmit</button></div></div>` : ''}
        ${t.status === 'awaiting_transfer' && isFinanceMember() ? renderTransferPanel(t) : ''}
        ${t.status === 'awaiting_transfer' && !isFinanceMember() ? `<div class="card"><b>Awaiting transfer.</b> All approvers approved this payment. Finance will process the transfer and upload proof of payment to close it.</div>` : ''}

        <div class="grid grid-2" style="gap:18px;">
          <div class="card">
            <h3 style="margin-top:0">Details</h3>
            ${renderTaskFields(t)}
          </div>
          <div class="card">
            <h3 style="margin-top:0">Attachments (${(t.attachments || []).length})</h3>
            ${renderAttachments(t)}
            ${(isSubmitter && !completedSteps.length) || canEditPath || state.user.role === 'admin' ? `
              <input type="file" id="fileInput" multiple style="display:none;" />
              <button class="btn" id="uploadBtn" style="margin-top: 10px;">+ Add files</button>
            ` : ''}
          </div>
        </div>

        ${canEditPath || (isSubmitter && !completedSteps.length) ? renderPathEditor(t) : ''}

        <div class="card">
          <h3 style="margin-top:0">Activity</h3>
          ${audit.length ? audit.map((a) => `
            <div style="display:flex; gap:12px; padding:8px 0; border-bottom: 1px solid var(--border); font-size:13px;">
              <div style="color: var(--text-dim); min-width: 120px;">${fmtDate(a.at)}</div>
              <div><b>${esc(userName(a.userId))}</b> · ${esc(a.action)}${a.meta?.comment ? ' — ' + esc(a.meta.comment) : ''}</div>
            </div>`).join('') : '<div class="card-meta">No activity yet.</div>'}
        </div>
      </div>`;
  }

  function renderTimeline(t) {
    return `
      <div class="card" style="padding: 8px 16px 16px;">
        <div class="timeline">
          <div class="timeline-rail"></div>
          <div class="timeline-steps">
            ${t.steps.map((s) => {
              let cls = 'timeline-step';
              if (s.status === 'approved') cls += ' done';
              else if (s.status === 'pending') cls += ' pending';
              else if (s.status === 'declined') cls += ' declined';
              else if (s.status === 'sent_back') cls += ' sent_back';
              const u = userById(s.approverId);
              return `
                <div class="${cls}">
                  <div class="timeline-node">${s.status === 'approved' ? '✓' : s.status === 'declined' ? '✕' : s.stepNumber}</div>
                  <div class="timeline-card">
                    <div style="font-weight:600">${esc(u?.name || 'Unknown')}</div>
                    <div class="card-meta">${roleLabel(u?.role || '')}</div>
                    <div class="card-meta" style="margin-top: 6px;">
                      ${s.status === 'pending' ? 'Waiting' : s.status === 'approved' ? '✅ ' + fmtAgo(s.actedAt) : s.status === 'declined' ? '❌ ' + fmtAgo(s.actedAt) : '↩ sent back'}
                    </div>
                    ${s.comment ? `<div class="card-meta" style="margin-top:6px; font-style: italic;">"${esc(s.comment)}"</div>` : ''}
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>
      </div>`;
  }

  function renderTransferPanel(t) {
    const attachs = t.attachments || [];
    return `
      <div class="card card-dark">
        <h3 style="margin-top:0;color:#d9f03a;">Finance — Process transfer</h3>
        <div style="margin-bottom: 14px; font-size: 14px;">All ${t.steps.length} approver(s) approved this ${esc(paymentTypeLabel(t.fields?.paymentType || 'payment'))}${t.fields?.amount ? ` for ${t.fields.amount} ${esc(t.fields.currency || '')}` : ''}. Upload the proof of transfer, then mark as transferred.</div>
        <input type="file" id="transferFileInput" style="display:none;" />
        <button class="btn" id="uploadTransferBtn" style="background: #ffffff; color: #16181b;">+ Upload proof of transfer</button>
        ${attachs.length ? `<div style="margin-top: 12px;">Attached files: ${attachs.map((a) => esc(a.name)).join(', ')}</div>` : ''}
        <div class="field" style="margin-top: 14px;">
          <label style="color:#d9f03a">Note (optional)</label>
          <textarea class="textarea" id="transferComment" placeholder="e.g. Wire transfer reference #..." style="background:#22252a;border-color:#3a3f47;color:#ecebe4"></textarea>
        </div>
        <button class="btn btn-primary" id="markTransferredBtn" ${!attachs.length ? 'disabled' : ''}>Mark as transferred</button>
        ${!attachs.length ? `<div class="card-meta" style="margin-top:8px;color:#9aa0a6;">Upload at least one proof file before marking.</div>` : ''}
      </div>`;
  }

  function renderActionPanel(t, step) {
    const completed = t.steps.filter((s) => s.status === 'approved');
    return `
      <div class="card" style="border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-soft);">
        <h3 style="margin-top: 0">It's your turn — step ${step.stepNumber} of ${t.steps.length}</h3>
        <div class="field">
          <label>Comment (optional)</label>
          <textarea class="textarea" id="actionComment" placeholder="Add a note…"></textarea>
        </div>
        <div class="row-actions" style="gap:10px;">
          <button class="btn btn-primary" id="approveBtn">Approve</button>
          <button class="btn btn-danger" id="declineBtn">Decline</button>
          ${completed.length ? `
            <select class="select" id="sendBackStep" style="width: auto; max-width: 200px;">
              <option value="">Send back to…</option>
              ${completed.map((s) => `<option value="${s.stepNumber}">Step ${s.stepNumber} · ${esc(userName(s.approverId))}</option>`).join('')}
              <option value="1">Step 1 · ${esc(userName(t.submitterId))} (submitter)</option>
            </select>
            <button class="btn" id="sendBackBtn">↩ Send back</button>
          ` : `
            <button class="btn" id="sendBackBtn" data-target="1">↩ Send back to submitter</button>
          `}
        </div>
      </div>`;
  }

  function renderTaskFields(t) {
    const f = t.fields || {};
    const rows = [];
    const projDisplay = projectLabel(t);
    if (projDisplay) rows.push(['Business', esc(projDisplay)]);
    if (t.category === 'payments') {
      rows.push(['Payment type', `<span class="chip chip-dim">${paymentTypeLabel(f.paymentType || 'payment')}</span>`]);
      rows.push(['Amount', f.amount ? `${f.amount} ${esc(f.currency || '')}` : '—']);
      rows.push(['Vendor', esc(f.vendor || '—')]);
      rows.push(['Purpose', esc(f.purpose || '—')]);
      if (f.country) rows.push(['Country', esc(f.country)]);
      if (f.dueDate) rows.push(['Due', esc(f.dueDate)]);
    } else if (t.category === 'content') {
      rows.push(['Link', f.link ? `<a href="${esc(f.link)}" target="_blank">${esc(f.link)}</a>` : '—']);
    }
    rows.push(['Description', f.description ? `<div style="white-space: pre-wrap">${esc(f.description)}</div>` : '—']);
    if (t.slackMessage) rows.push(['Source', `Slack message from ${esc(t.slackMessage.channelName || t.slackMessage.channelId || 'DM')}`]);
    if (t.status === 'transferred') {
      rows.push(['Transferred by', `${esc(userName(t.transferredBy))} · ${fmtDate(t.transferredAt)}`]);
      if (t.transferComment) rows.push(['Transfer note', esc(t.transferComment)]);
    }
    return `<div class="kv">${rows.map(([k,v]) => `<div class="k">${k}</div><div>${v}</div>`).join('')}</div>`;
  }

  function renderAttachments(t) {
    if (!(t.attachments || []).length) return `<div class="card-meta">No files attached.</div>`;
    return (t.attachments || []).map((a) => `
      <div class="file-row">
        <span class="name">${esc(a.name)}</span>
        <span class="size">${fmtBytes(a.size)}</span>
        <a class="btn" style="padding: 5px 10px;" href="/api/attachments?id=${esc(a.id)}" target="_blank">Open</a>
      </div>`).join('');
  }
  function fmtBytes(n) {
    if (!n) return '';
    const u = ['B','KB','MB','GB'];
    let i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
    return n.toFixed(n >= 10 || i === 0 ? 0 : 1) + ' ' + u[i];
  }

  function renderPathEditor(t) {
    const completed = t.steps.filter((s) => s.status !== 'pending');
    const pending = t.steps.filter((s) => s.status === 'pending');
    return `
      <details class="card">
        <summary style="cursor: pointer; font-weight: 600;">Edit approval path (${pending.length} remaining steps)</summary>
        <div style="margin-top: 14px;" id="pathEditor">
          ${completed.length ? `<div class="card-meta" style="margin-bottom:10px">Already decided (locked): ${completed.map((s) => esc(userName(s.approverId))).join(' → ')}</div>` : ''}
          <div class="step-builder" id="stepBuilderEdit">
            ${pending.map((s, idx) => stepBuilderRowHTML(s.approverId, completed.length + idx + 1)).join('')}
          </div>
          <div class="row-actions">
            <button class="btn" id="addStepEdit">+ Add step</button>
            <button class="btn btn-primary" id="savePath">Save path</button>
          </div>
        </div>
      </details>`;
  }

  function stepBuilderRowHTML(selectedId, num) {
    return `<div class="step-builder-row">
      <div class="num">${num}</div>
      <select class="select approver-pick">
        <option value="">Choose approver…</option>
        ${state.users.map((u) => `<option value="${u.id}" ${u.id === selectedId ? 'selected' : ''}>${esc(u.name)} · ${roleLabel(u.role)}</option>`).join('')}
      </select>
      <button class="rm">×</button>
    </div>`;
  }

  // ─── AI-powered new approval modal ───
  // Phases:
  //   "describe"  — initial input (text + voice + files), AI hasn't run yet
  //   "thinking"  — waiting on AI response
  //   "ask"       — AI asked a clarifying question, user types reply
  //   "review"    — AI proposed; user reviews/edits and picks the approval path
  let _ai = {
    phase: 'describe',     // describe | thinking | ask | review
    messages: [],          // conversation with AI
    images: [],            // {base64, mediaType} for images sent to AI
    files: [],             // File objects to upload after task creation
    proposed: null,        // { title, category, fields, suggestedApproverIds[] }
    question: null,        // current AI question (during 'ask')
    error: null,
    draftId: null,
    sourceDraft: null,     // the original draft if this came from Slack/TG
    recording: false,
  };
  function resetAI() {
    _ai = { phase: 'describe', messages: [], images: [], files: [], proposed: null, question: null, error: null, draftId: null, sourceDraft: null, recording: false };
  }

  // ─── NEW tab: pick mode → Fill or AI ───
  let _manual = {
    feedback: null,
    checking: false,
    error: null,
    validateReply: '',
    draft: emptyManualDraft(),
  };
  function emptyManualDraft() {
    return { title: '', category: 'payments', description: '', fields: {}, approverIds: [] };
  }
  function resetManual() {
    _manual = { feedback: null, checking: false, error: null, validateReply: '', draft: emptyManualDraft() };
  }
  function resetNewPage() {
    resetAI();
    resetManual();
    state.newCreationMode = null;
  }
  function snapshotManualDraft() {
    const titleEl = document.getElementById('newTitle');
    if (!titleEl) return;
    const catEl = document.getElementById('newCategory');
    const descEl = document.getElementById('newDescription');
    _manual.draft = {
      title: titleEl.value,
      category: catEl?.value || 'other',
      description: descEl?.value || '',
      fields: gatherCategoryFields(catEl?.value || 'other'),
      approverIds: Array.from(document.querySelectorAll('#stepBuilder .approver-pick')).map((s) => s.value),
    };
  }

  function renderSlackDraftsPanel() {
    const drafts = state.drafts || [];
    if (!drafts.length) return '';
    return `
      <div class="card" style="margin-bottom: 20px;">
        <h3 style="margin:0 0 12px;font-size:14px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;">From Slack — finish (${drafts.length})</h3>
        <div class="grid" style="gap: 8px;">
          ${drafts.map((d) => `
            <div class="card-row" style="background: var(--card-2); padding: 12px 14px; border-radius: 12px;">
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;">${esc(d.title || 'Untitled draft')}</div>
                <div class="card-meta" style="margin-top:4px;">${d.senderName ? 'From ' + esc(d.senderName) + ' · ' : ''}Slack · ${fmtAgo(d.createdAt)}</div>
              </div>
              <button class="btn btn-primary" data-finish-draft="${esc(d.id)}">Finish with AI →</button>
              <button class="btn btn-danger" data-delete-draft="${esc(d.id)}" title="Delete draft">×</button>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  function renderNewPage() {
    if (!state.newCreationMode) {
      return `
        <div class="new-page-header">
          <h1>New approval</h1>
          <p class="card-meta">Fill in the details yourself, or let AI guide you through a short conversation.</p>
        </div>
        ${renderSlackDraftsPanel()}
        <div class="mode-pick">
          <div class="mode-card" id="pickManual">
            <div class="mode-icon">✎</div>
            <h3>Fill in yourself</h3>
            <p>Enter all fields, then AI checks your draft — tells you what's required and what to add. Submit when AI says it's ready.</p>
          </div>
          <div class="mode-card" id="pickAI">
            <div class="mode-icon">✦</div>
            <h3>Create with AI</h3>
            <p>Describe what you need in chat (or dictate). AI asks one or two questions, then drafts the request for you to review.</p>
          </div>
        </div>`;
    }
    if (state.newCreationMode === 'ai') return renderNewAIPage();
    return renderNewManualPage();
  }

  function renderNewAIPage() {
    if (_ai.phase === 'review') return renderNewAIReviewSection();
    return `
      <div class="new-page-header card-row" style="align-items: flex-start;">
        <div style="flex:1;">
          <h1>Create with AI</h1>
          <p class="card-meta">Answer AI's questions — it'll draft the approval for you.</p>
        </div>
        <button class="btn btn-ghost" id="backToModePick">← Change method</button>
      </div>
      <div class="card">
        ${_ai.sourceDraft ? `<div class="card" style="margin-bottom: 14px; background: var(--card-2);">
          <div class="card-meta">${_ai.sourceDraft.senderName ? 'From Slack: ' + esc(_ai.sourceDraft.senderName) : 'From Slack'}</div>
          <div style="margin-top: 6px; white-space: pre-wrap; font-size: 13px;">${esc(_ai.sourceDraft.description)}</div>
        </div>` : ''}
        ${renderAIChatThread()}
        ${_ai.phase === 'ask' && _ai.question ? `
          <div class="chat-bubble ai"><div class="label">AI asks</div><div>${esc(_ai.question)}</div></div>` : ''}
        ${_ai.phase === 'thinking' ? `
          <div style="text-align:center; padding: 24px 0;">
            <span class="spin"></span><div style="margin-top: 10px; color: var(--text-dim);">Thinking…</div>
          </div>` : `
          <div class="field">
            <label>${_ai.phase === 'ask' ? 'Your reply' : 'Describe the request'}</label>
            <textarea class="textarea" id="aiInput" rows="4" placeholder="e.g. Pay Adobe \$240 USD for Creative Cloud renewal, invoice attached…">${esc(_ai.sourceDraft && !_ai.messages.length ? (_ai.sourceDraft.description || '') : '')}</textarea>
          </div>
          <div class="card-row" style="gap: 10px; flex-wrap: wrap; margin-bottom: 8px;">
            <button class="btn" id="recordBtn">${_ai.recording ? '⏹ Stop' : '🎤 Dictate'}</button>
            <button class="btn" id="attachFilesBtn">📎 Files</button>
            <input type="file" id="aiFileInput" multiple style="display:none;" accept="*/*" />
            <span class="card-meta">${_ai.files.length ? _ai.files.length + ' file(s)' : ''}${_ai.images.length ? (_ai.files.length ? ' · ' : '') + _ai.images.length + ' image(s) for AI' : ''}</span>
          </div>
          ${_ai.files.length ? _ai.files.map((f, i) => `
            <div class="file-row"><span class="name">${esc(f.name)}</span><span class="size">${fmtBytes(f.size)}</span>
              <button class="btn-ghost" data-rm-file="${i}" style="padding:2px 6px;color:var(--danger);border:none;background:transparent;cursor:pointer;">×</button>
            </div>`).join('') : ''}
        `}
        ${_ai.error ? `<div class="error">${esc(_ai.error)}</div>` : ''}
        ${_ai.phase !== 'thinking' ? `
        <div class="form-actions" style="margin-top:20px;">
          <div class="actions-row">
            <p class="actions-hint">${_ai.phase === 'ask' ? 'Answer the question, then send your reply.' : 'Describe the request — attach files or dictate if helpful.'}</p>
            <button class="btn btn-primary" id="aiSubmit">${_ai.messages.length ? 'Send reply' : 'Start conversation'}</button>
          </div>
        </div>` : ''}
      </div>`;
  }

  function renderAIChatThread() {
    const turns = [];
    _ai.messages.forEach((m) => {
      if (m.role === 'user') {
        const text = typeof m.content === 'string' ? m.content : '';
        turns.push(`<div class="chat-bubble user">${esc(text)}</div>`);
      } else if (m.role === 'assistant') {
        try {
          const j = JSON.parse(typeof m.content === 'string' ? m.content : '{}');
          if (j.question) turns.push(`<div class="chat-bubble ai"><div class="label">AI</div>${esc(j.question)}</div>`);
        } catch { /* skip */ }
      }
    });
    return turns.length ? `<div class="ai-chat-thread">${turns.join('')}</div>` : '';
  }

  function renderNewAIReviewSection() {
    const p = _ai.proposed || {};
    return `
      <div class="new-page-header card-row">
        <div style="flex:1;"><h1>Review & submit</h1><p class="card-meta">AI drafted this. Edit anything, then submit.</p></div>
        <button class="btn btn-ghost" id="backToAIChat">← Refine with AI</button>
      </div>
      <div class="card">
        <div class="field"><label>Title</label><input class="input" id="newTitle" value="${esc(p.title || '')}" /></div>
        <div class="field"><label>Category</label>
          <select class="select" id="newCategory">
            <option value="payments" ${p.category === 'payments' ? 'selected' : ''}>Payments</option>
            <option value="content" ${p.category === 'content' ? 'selected' : ''}>Content</option>
            <option value="other" ${(!p.category || p.category === 'other') ? 'selected' : ''}>Other</option>
          </select>
        </div>
        <div id="categoryFields"></div>
        <div class="field"><label>Description</label><textarea class="textarea" id="newDescription" rows="3">${esc(p.fields?.description || '')}</textarea></div>
        <div class="field"><label>Approval path</label>
          <div class="step-builder" id="stepBuilder">
            ${(p.suggestedApproverIds?.length ? p.suggestedApproverIds : ['']).map((id, i) => stepBuilderRowHTML(id, i + 1)).join('')}
          </div>
          <button class="btn" id="addStep" style="margin-top:8px;">+ Add step</button>
        </div>
        ${_ai.files.length ? `<div class="field"><label>Attachments</label>${_ai.files.map((f) => `<div class="file-row"><span class="name">${esc(f.name)}</span></div>`).join('')}</div>` : ''}
        ${_ai.error ? `<div class="error">${esc(_ai.error)}</div>` : ''}
        <div class="form-actions">
          <div class="actions-row">
            <p class="actions-hint"><strong>Almost done.</strong> Edit the draft if needed, then submit.</p>
            <button class="btn btn-primary" id="submitFinal">Submit for approval</button>
          </div>
        </div>
      </div>`;
  }

  function renderManualWorkflowSteps() {
    const fb = _manual.feedback;
    const step1 = fb ? 'done' : 'active';
    const step2 = !fb ? '' : (fb.ready ? 'done' : 'active');
    const step3 = fb?.ready ? 'active' : '';
    return `
      <div class="workflow-steps">
        <span class="workflow-step ${step1}"><span class="num">1</span> Fill in details</span>
        <span class="workflow-step ${step2}"><span class="num">2</span> AI check</span>
        <span class="workflow-step ${step3}"><span class="num">3</span> Submit</span>
      </div>`;
  }

  function renderNewManualPage() {
    const fb = _manual.feedback;
    const canSubmit = !!fb?.ready;
    const d = _manual.draft || emptyManualDraft();
    const approvers = d.approverIds && d.approverIds.length ? d.approverIds : [''];
    return `
      <div class="new-page-header card-row">
        <div style="flex:1;">
          <h1>Fill in yourself</h1>
          <p class="card-meta">Complete every field, run AI check, then submit when marked ready.</p>
        </div>
        <button class="btn btn-ghost" id="backToModePick">← Change method</button>
      </div>
      <div class="card">
        ${renderManualWorkflowSteps()}
        <div class="form-section-title">Request</div>
        <div class="field"><label>Title</label><input class="input" id="newTitle" placeholder="Short summary of the request" value="${esc(d.title || '')}" /></div>
        <div class="field"><label>Category</label>
          <select class="select" id="newCategory">
            <option value="payments" ${d.category === 'payments' ? 'selected' : ''}>Payments</option>
            <option value="content" ${d.category === 'content' ? 'selected' : ''}>Content</option>
            <option value="other" ${d.category === 'other' ? 'selected' : ''}>Other</option>
          </select>
        </div>
        <div id="categoryFields"></div>
        <div class="field"><label>Description</label><textarea class="textarea" id="newDescription" rows="4" placeholder="Context, background, anything approvers should know">${esc(d.description || '')}</textarea></div>
        <div class="form-section-title">Approval path</div>
        <div class="step-builder" id="stepBuilder">${approvers.map((id, i) => stepBuilderRowHTML(id || '', i + 1)).join('')}</div>
        <button class="btn" id="addStep" style="margin-top:10px;">+ Add approver step</button>

        ${_manual.checking ? `<div class="ai-checking"><span class="spin"></span><div class="card-meta" style="margin-top:10px;">AI is reviewing your draft…</div></div>` : ''}

        ${fb && !_manual.checking ? `
          <div class="form-section-title">AI review</div>
          ${fb.required?.length ? `<div class="ai-feedback required"><b>Must add</b><ul>${fb.required.map((s) => `<li>${esc(s)}</li>`).join('')}</ul></div>` : ''}
          ${fb.suggestions?.length ? `<div class="ai-feedback suggestions"><b>Suggestions</b><ul>${fb.suggestions.map((s) => `<li>${esc(s)}</li>`).join('')}</ul></div>` : ''}
          ${fb.ready ? `<div class="ai-feedback ok-panel"><b>Ready to submit</b>All required fields passed. Re-run check if you change anything.</div>` : ''}
          ${fb.question ? `
            <div class="ai-feedback" style="border-left:4px solid var(--accent);">
              <b>AI asks</b><p style="margin:8px 0 0;font-size:13px;">${esc(fb.question)}</p>
              <div class="field" style="margin-top:12px;margin-bottom:0;">
                <label>Your answer</label>
                <textarea class="textarea" id="validateReply" rows="2" placeholder="Optional — then re-run Check with AI">${esc(_manual.validateReply)}</textarea>
              </div>
            </div>` : ''}
        ` : ''}

        ${_manual.error ? `<div class="error" style="margin-top:14px;">${esc(_manual.error)}</div>` : ''}

        <div class="form-actions">
          <div class="actions-row">

  // If user typed a custom business name, save it as a project so it appears in
  // the dropdown next time. Returns updated fields with projectId set.
  async function resolveProjectInFields(fields) {
    if (!fields) return fields;
    if (fields.projectId) return fields;
    const name = (fields.projectName || '').trim();
    if (!name) return fields;
    try {
      const r = await api('/api/projects', { method: 'POST', body: { name } });
      return { ...fields, projectId: r.project.id, projectName: r.project.name };
    } catch (e) {
      // If creation fails (e.g. permissions, network), keep projectName so the
      // task at least carries the business name even if it's not in the master list.
      return fields;
    }
  }

  function bindPaymentTypeField() {
    const sel = document.getElementById('fPaymentType');
    const help = document.getElementById('paymentTypeHelp');
    if (!sel || !help) return;
    const repaint = () => {
      if (sel.value === 'refund') help.innerHTML = `<span style="color: var(--warn);">⚠ Refunds require both the original invoice <b>and</b> proof of the original payment (POP) attached.</span>`;
      else if (sel.value === 'postpayment') help.innerHTML = `Postpayment — the work/service was already delivered. Attach the invoice.`;
      else help.innerHTML = `Regular payment — attach the invoice.`;
    };
    sel.onchange = repaint;
    repaint();
  }

  function gatherCategoryFields(category) {
    const projSel = document.getElementById('fProjectId');
    const projName = document.getElementById('fProjectName');
    let projectId = null, projectName = '';
    if (projSel) {
      if (projSel.value === '__other') projectName = (projName?.value || '').trim();
      else if (projSel.value) projectId = projSel.value;
    }
    const common = { projectId, projectName };

    if (category === 'payments') {
      return {
        ...common,
        paymentType: document.getElementById('fPaymentType')?.value || 'payment',
        amount: document.getElementById('fAmount')?.value || null,
        currency: document.getElementById('fCurrency')?.value || 'AED',
        vendor: (document.getElementById('fVendor')?.value || '').trim(),
        purpose: (document.getElementById('fPurpose')?.value || '').trim(),
        country: (document.getElementById('fCountry')?.value || '').trim(),
        dueDate: document.getElementById('fDueDate')?.value || null,
      };
    }
    if (category === 'content') {
      return { ...common, link: (document.getElementById('fLink')?.value || '').trim() };
    }
    return common;

  // ─── Binders ───
  function bindMain() {
    // Scope tabs (For me / Submitted / History / New / Admin)
    document.querySelectorAll('.pill[data-scope]').forEach((el) => {
      el.onclick = async () => {
        const next = el.dataset.scope;
        if (next !== 'new') state.newCreationMode = null;
        state.scope = next;
        nav('/');
        await refreshAll();
        render();
      };
    });

    // Filter controls (list tabs only)
    document.querySelectorAll('.filter-ctrl').forEach((el) => {
      const key = el.dataset.filter;
      const apply = () => { state.filters[key] = el.value; render(); };
      el.onchange = apply;
      if (el.type === 'date') el.oninput = apply;
    });
    const clearFiltersBtn = document.getElementById('clearFiltersBtn');
    if (clearFiltersBtn) clearFiltersBtn.onclick = () => { clearFilters(); render(); };

    // Task card open + quick approve
    document.querySelectorAll('[data-open-task]').forEach((el) => {
      el.onclick = () => { nav('/task/' + el.dataset.openTask); };
    });
    document.querySelectorAll('[data-quick-approve]').forEach((btn) => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const id = btn.dataset.quickApprove;
        if (btn.disabled) return;
        btn.disabled = true;
        btn.textContent = '…';
        try {
          await api('/api/tasks/' + id + '/act', { method: 'POST', body: { action: 'approve', comment: '' } });
          delete _taskCache[id];
          await refreshAll();
          render();
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Approve';
          state.flash = `<h2 style="margin-top:0">Could not approve</h2><p>${esc(err.message)}</p>`;
          render();
        }
      };
    });

    const navAdmin = document.getElementById('navAdmin');
    if (navAdmin) navAdmin.onclick = () => nav('/admin');
    const backHome = document.getElementById('backHome');
    if (backHome) backHome.onclick = async () => {
      if (state.scope === 'new') state.scope = 'pending';
      nav('/');
      await refreshAll();
      render();
    };

    // Drafts panel buttons (only rendered on New tab now)
    document.querySelectorAll('[data-finish-draft]').forEach((b) => {
      b.onclick = () => {
        const draft = state.drafts.find((d) => d.id === b.dataset.finishDraft);
        if (!draft) return;
        resetAI();
        resetManual();
        _ai.sourceDraft = draft;
        _ai.draftId = draft.id;
        state.scope = 'new';
        state.newCreationMode = 'ai';
        nav('/');
        render();
      };
    });
    document.querySelectorAll('[data-delete-draft]').forEach((b) => {
      b.onclick = async () => {
        if (!confirm('Delete this draft?')) return;
        await api('/api/task-drafts/' + b.dataset.deleteDraft, { method: 'DELETE' });
        await refreshAll();
        render();
      };
    });

    document.getElementById('bellBtn').onclick = openInbox;
    document.getElementById('profileBtn').onclick = () => { state.drawerOpen = true; _connectInfo = {}; render(); };

    const flashOk = document.getElementById('flashOk');
    if (flashOk) flashOk.onclick = () => { state.flash = null; render(); };

    if (state.scope === 'new') bindNewPage();
    if (state.modalOpen === 'admin-user') bindAdminUserModal();
    if (state.drawerOpen) bindDrawer();
    if (state.route.path === '/admin') bindAdmin();
    if (state.route.segs[0] === 'task') bindTaskDetail(state.route.segs[1]);
  }

  function bindManualFormSetup(prefill) {
    const catEl = document.getElementById('newCategory');

    function repaint() {
      fieldsEl.innerHTML = renderCategoryFields(catEl.value);

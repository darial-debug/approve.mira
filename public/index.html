      bindProjectField();
      if (prefill && catEl.value === prefill.category) {
        const f = prefill.fields || {};
        const setVal = (id, v) => { const el = document.getElementById(id); if (el && v !== undefined && v !== null) el.value = v; };
        if (catEl.value === 'payments') {
          setVal('fPaymentType', f.paymentType);
          setVal('fAmount', f.amount);
          setVal('fCurrency', f.currency);
          setVal('fVendor', f.vendor);
          setVal('fPurpose', f.purpose);
          setVal('fCountry', f.country);
          setVal('fDueDate', f.dueDate);
        } else if (catEl.value === 'content') {
          setVal('fLink', f.link);
        }
        const projSel = document.getElementById('fProjectId');
        const projName = document.getElementById('fProjectName');
        if (projSel) {
          if (f.projectId) projSel.value = f.projectId;
          else if (f.projectName && projName) {
            projSel.value = '__other';
            projName.style.display = 'block';
            projName.value = f.projectName;
          }
        }
      }
    }
    repaint();
    catEl.onchange = repaint;
    const addStep = document.getElementById('addStep');
    if (addStep) addStep.onclick = () => {
      const b = document.getElementById('stepBuilder');
      const div = document.createElement('div');
      div.innerHTML = stepBuilderRowHTML('', b.children.length + 1);
      b.appendChild(div.firstChild);
      attachRowHandlers(b);
    };
    attachRowHandlers(document.getElementById('stepBuilder'));
  }

  function gatherManualDraft() {
    const category = document.getElementById('newCategory')?.value || 'other';
    const fields = gatherCategoryFields(category);
    fields.description = (document.getElementById('newDescription')?.value || '').trim();
    const approverIds = Array.from(document.querySelectorAll('#stepBuilder .approver-pick')).map((s) => s.value).filter(Boolean);
    return {
      title: (document.getElementById('newTitle')?.value || '').trim(),
      category,
      fields,
      approverIds,
    };
  }

  function bindManualPage() {
    bindManualFormSetup(_manual.draft);
    const validateReply = document.getElementById('validateReply');
    if (validateReply) validateReply.oninput = (e) => { _manual.validateReply = e.target.value; };
    const checkBtn = document.getElementById('checkWithAI');
    if (checkBtn) checkBtn.onclick = checkManualWithAI;
    const submitBtn = document.getElementById('submitManual');
    if (submitBtn) submitBtn.onclick = submitManualApproval;
  }

  async function checkManualWithAI() {
    snapshotManualDraft();
    const draft = gatherManualDraft();
    if (!draft.title) { _manual.error = 'Add a title first.'; render(); return; }
    _manual.error = null;
    _manual.checking = true;
    render();
    try {
      const reply = (document.getElementById('validateReply')?.value || '').trim();
      if (reply) draft.fields.description = (draft.fields.description ? draft.fields.description + '\n\n' : '') + reply;
      const r = await api('/api/ai-draft', { method: 'POST', body: { mode: 'validate', draft } });
      _manual.feedback = r;
      _manual.validateReply = '';
    } catch (e) {
      _manual.error = e.message;
    }
    _manual.checking = false;
    render();
  }

  async function submitManualApproval() {
    snapshotManualDraft();
    const draft = gatherManualDraft();
    if (!_manual.feedback?.ready) {
      _manual.error = 'Run "Check with AI" first — submit unlocks when AI marks it ready.';
      render();
      return;
    }
    if (!draft.title) { _manual.error = 'Title required'; render(); return; }
    if (!draft.approverIds.length) { _manual.error = 'Add at least one approver'; render(); return; }
    _manual.error = null;
    try {
      // Promote a typed custom business to a saved project so it appears next time.
      draft.fields = await resolveProjectInFields(draft.fields);
      const r = await api('/api/tasks', { method: 'POST', body: {
        title: draft.title, category: draft.category, fields: draft.fields, approverIds: draft.approverIds, source: 'web',
      } });
      resetNewPage();
      state.scope = 'submitted';
      await refreshAll();
      nav('/task/' + r.task.id);
    } catch (e) {
      _manual.error = e.message;
      render();
    }
  }

  async function handleFileSelect(e) {
    const files = Array.from(e.target.files || []);
    for (const f of files) {
      _ai.files.push(f);
      // If it's an image, also send to AI for context
      if (f.type.startsWith('image/') && f.size < 4 * 1024 * 1024) {
        const base64 = await fileToBase64(f);
        _ai.images.push({ base64, mediaType: f.type });
      }
    }
    render();
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        const base64 = result.split(',')[1];
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ─── Voice recording (MediaRecorder → /api/transcribe) ───
  let _mediaRecorder = null;
  let _recordedChunks = [];
  async function toggleRecording() {
    if (_ai.recording) {
      _mediaRecorder?.stop();
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      _mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      _recordedChunks = [];
      _mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) _recordedChunks.push(e.data); };
      _mediaRecorder.onstop = async () => {
        stream.getTracks().forEach((t) => t.stop());
        _ai.recording = false;
        render();
        const blob = new Blob(_recordedChunks, { type: 'audio/webm' });
        if (blob.size < 1000) return; // ignore micro-clicks
        try {
          const base64 = await fileToBase64(new File([blob], 'voice.webm', { type: 'audio/webm' }));
          const r = await api('/api/transcribe', { method: 'POST', body: { audio: base64, mimeType: 'audio/webm' } });
          const ta = document.getElementById('aiInput');
          if (ta) {
            ta.value = (ta.value ? ta.value + ' ' : '') + (r.text || '');
            ta.focus();
          }
        } catch (e) {
          _ai.error = 'Transcription failed: ' + e.message;
          render();
        }
      };
      _mediaRecorder.start();
      _ai.recording = true;
      render();
    } catch (e) {
      _ai.error = 'Microphone access denied: ' + e.message;
      render();
    }
  }

  async function sendToAI() {
    const input = (document.getElementById('aiInput')?.value || '').trim();
    if (!input && !_ai.images.length) {
      _ai.error = 'Type or dictate a description first.';
      render();
      return;
    }
    _ai.error = null;
    _ai.messages.push({ role: 'user', content: input || 'Draft based on attached images.' });
    _ai.phase = 'thinking';
    render();
    try {
      const r = await api('/api/ai-draft', { method: 'POST', body: {
        messages: _ai.messages,
        images: _ai.images,
        source: _ai.sourceDraft ? 'slack' : 'web',
      } });
      // After first send, don't re-send images on subsequent turns (saves tokens)
      _ai.images = [];
      if (r.needsMoreInfo) {
        _ai.messages.push({ role: 'assistant', content: JSON.stringify(r) });
        _ai.phase = 'ask';
        _ai.question = r.question;
      } else {
        _ai.proposed = r.proposed;
        _ai.phase = 'review';
      }
    } catch (e) {
      _ai.error = e.message;
      _ai.phase = _ai.messages.length > 1 ? 'ask' : 'describe';
    }
    render();
  }

  function bindAIReviewControls() {
    const catEl = document.getElementById('newCategory');
    const fieldsEl = document.getElementById('categoryFields');
    const descEl = document.getElementById('newDescription');
    if (descEl && _ai.proposed?.fields?.description) descEl.value = _ai.proposed.fields.description;

    function repaintFields() {
      fieldsEl.innerHTML = renderCategoryFields(catEl.value);
      const f = _ai.proposed?.fields || {};
      const setVal = (id, v) => { const el = document.getElementById(id); if (el && v !== undefined && v !== null) el.value = v; };
      const projSel = document.getElementById('fProjectId');
      const projName = document.getElementById('fProjectName');
      if (projSel) {
        if (f.projectId) projSel.value = f.projectId;
        else if (f.projectName && projName) {
          projSel.value = '__other';
          projName.style.display = 'block';
          projName.value = f.projectName;
        }
      }
      if (catEl.value === 'payments') {
        setVal('fPaymentType', f.paymentType);
        setVal('fAmount', f.amount);
        setVal('fCurrency', f.currency);
        setVal('fVendor', f.vendor);
        setVal('fPurpose', f.purpose);
        setVal('fCountry', f.country);
        setVal('fDueDate', f.dueDate);
        bindPaymentTypeField();
      } else if (catEl.value === 'content') {
        setVal('fLink', f.link);
      }
      bindProjectField();
    }
    repaintFields();
    catEl.onchange = repaintFields;

    document.getElementById('addStep').onclick = () => {
      const b = document.getElementById('stepBuilder');
      const div = document.createElement('div');
      div.innerHTML = stepBuilderRowHTML('', b.children.length + 1);
      b.appendChild(div.firstChild);
      attachRowHandlers(b);
    };
    attachRowHandlers(document.getElementById('stepBuilder'));

    const backChat = document.getElementById('backToAIChat');
    if (backChat) backChat.onclick = () => {
      _ai.phase = 'ask';
      _ai.question = 'What would you like to change about the draft?';
      render();
    };

    document.getElementById('submitFinal').onclick = async () => {
      const title = document.getElementById('newTitle').value.trim();
      const category = catEl.value;
      const fields = gatherCategoryFields(category);
      fields.description = (document.getElementById('newDescription')?.value || _ai.proposed?.fields?.description || '').trim();
      const approverIds = Array.from(document.querySelectorAll('#stepBuilder .approver-pick')).map((s) => s.value).filter(Boolean);
      _ai.error = null;
      if (!title) { _ai.error = 'Title required'; render(); return; }
      if (!approverIds.length) { _ai.error = 'Add at least one approver'; render(); return; }
      try {
        const resolvedFields = await resolveProjectInFields(fields);
        const r = await api('/api/tasks', { method: 'POST', body: {
          title, category, fields: resolvedFields, approverIds,
          source: _ai.sourceDraft ? 'slack' : 'web',
          slackMessage: _ai.sourceDraft?.slackMessage || null,
        } });
        if (_ai.files.length) await uploadFiles(_ai.files, r.task.id);
        if (_ai.draftId) await api('/api/task-drafts/' + _ai.draftId, { method: 'DELETE' }).catch(() => {});
        const newTaskId = r.task.id;
        resetNewPage();
        state.scope = 'submitted';
        await refreshAll();
        nav('/task/' + newTaskId);
      } catch (e) {
        _ai.error = e.message;
        render();
      }
    };
  }
  function attachRowHandlers(container) {
    container.querySelectorAll('.rm').forEach((b) => {
      b.onclick = (e) => {
        e.preventDefault();
        const rows = container.querySelectorAll('.step-builder-row');
        if (rows.length > 1) b.closest('.step-builder-row').remove();
      };
    });
  }

  async function uploadFiles(files, taskId) {
    const CHUNK = 3 * 1024 * 1024;
    for (const file of files) {
      const uploadId = 'up_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
      const totalChunks = Math.max(1, Math.ceil(file.size / CHUNK));
      for (let i = 0; i < totalChunks; i++) {
        const slice = file.slice(i * CHUNK, (i + 1) * CHUNK);
        const buf = new Uint8Array(await slice.arrayBuffer());
        let s = '';
        for (let j = 0; j < buf.length; j++) s += String.fromCharCode(buf[j]);
        const base64 = btoa(s);
        await api('/api/attachments', { method: 'POST', body: { action: 'chunk', uploadId, chunkIndex: i, base64 } });
      }
      await api('/api/attachments', { method: 'POST', body: {
        action: 'finalize', uploadId, totalChunks, name: file.name, mimeType: file.type, size: file.size, taskId,
      } });
    }
  }

  function bindTaskDetail(id) {
    const approveBtn = document.getElementById('approveBtn');
    const declineBtn = document.getElementById('declineBtn');
    const sendBackBtn = document.getElementById('sendBackBtn');
    const commentEl = () => document.getElementById('actionComment');

    if (approveBtn) approveBtn.onclick = async () => {
      try {
        const r = await api('/api/tasks/' + id + '/act', { method: 'POST', body: { action: 'approve', comment: commentEl().value } });
        _taskCache[id] = { task: r.task, audit: [] };
        await refreshAll();
        loadTaskDetail(id);
      } catch (e) { alert(e.message); }
    };
    if (declineBtn) declineBtn.onclick = async () => {
      try {
        const r = await api('/api/tasks/' + id + '/act', { method: 'POST', body: { action: 'decline', comment: commentEl().value } });
        _taskCache[id] = { task: r.task, audit: [] };
        await refreshAll();
        loadTaskDetail(id);
      } catch (e) { alert(e.message); }
    };
    if (sendBackBtn) sendBackBtn.onclick = async () => {
      const sel = document.getElementById('sendBackStep');
      const target = sel ? sel.value : sendBackBtn.dataset.target;
      if (!target) { alert('Pick a step to send back to'); return; }
      try {
        const r = await api('/api/tasks/' + id + '/act', { method: 'POST', body: { action: 'send_back', stepNumber: Number(target), comment: commentEl()?.value || '' } });
        _taskCache[id] = { task: r.task, audit: [] };
        await refreshAll();
        loadTaskDetail(id);
      } catch (e) { alert(e.message); }
    };

    const resubmit = document.getElementById('resubmitBtn');
    if (resubmit) resubmit.onclick = async () => {
      try {
        const r = await api('/api/tasks/' + id + '/resubmit', { method: 'POST' });
        _taskCache[id] = { task: r.task, audit: [] };
        await refreshAll();
        loadTaskDetail(id);
      } catch (e) { alert(e.message); }
    };

    // Upload
    const upBtn = document.getElementById('uploadBtn');
    if (upBtn) upBtn.onclick = () => document.getElementById('fileInput').click();
    const upInput = document.getElementById('fileInput');
    if (upInput) upInput.onchange = async () => {
      if (!upInput.files.length) return;
      try {
        await uploadFiles(upInput.files, id);
        await loadTaskDetail(id);
      } catch (e) { alert(e.message); }
    };

    // Finance transfer panel
    const transferUp = document.getElementById('uploadTransferBtn');
    const transferIn = document.getElementById('transferFileInput');
    if (transferUp) transferUp.onclick = () => transferIn.click();
    if (transferIn) transferIn.onchange = async () => {
      if (!transferIn.files.length) return;
      try {
        await uploadFiles(transferIn.files, id);
        await loadTaskDetail(id);
      } catch (e) { alert(e.message); }
    };
    const markTransferred = document.getElementById('markTransferredBtn');
    if (markTransferred) markTransferred.onclick = async () => {
      const comment = document.getElementById('transferComment')?.value.trim();
      try {
        const r = await api('/api/tasks/' + id + '/transfer', { method: 'POST', body: { comment } });
        _taskCache[id] = { task: r.task, audit: [] };
        await refreshAll();
        loadTaskDetail(id);
      } catch (e) { alert(e.message); }
    };

    // Path editor save
    const savePath = document.getElementById('savePath');
    if (savePath) {
      attachRowHandlers(document.getElementById('stepBuilderEdit'));
      document.getElementById('addStepEdit').onclick = () => {
        const b = document.getElementById('stepBuilderEdit');
        const div = document.createElement('div');
        div.innerHTML = stepBuilderRowHTML('', b.children.length + 1);
        b.appendChild(div.firstChild);
        attachRowHandlers(b);
      };
      savePath.onclick = async () => {
        const approverIds = Array.from(document.querySelectorAll('#stepBuilderEdit .approver-pick')).map((s) => s.value).filter(Boolean);
        if (!approverIds.length) return alert('Need at least one approver');
        try {
          const r = await api('/api/tasks/' + id, { method: 'PATCH', body: { approverIds } });
          _taskCache[id] = { task: r.task, audit: [] };
          await refreshAll();
          loadTaskDetail(id);
        } catch (e) { alert(e.message); }
      };
    }
  }

  function bindAdmin() {
    document.getElementById('newUserBtn').onclick = () => { state.editingUserId = null; state.modalOpen = 'admin-user'; render(); };
    document.getElementById('newDeptBtn').onclick = async () => {
      const name = prompt('Department name?'); if (!name) return;
      await api('/api/departments', { method: 'POST', body: { name } });
      await refreshAll();
      render();
    };
    document.querySelectorAll('[data-edit-user]').forEach((b) => {
      b.onclick = () => { state.editingUserId = b.dataset.editUser; state.modalOpen = 'admin-user'; render(); };
    });
    document.querySelectorAll('[data-del-user]').forEach((b) => {
      b.onclick = async () => {
        if (!confirm('Delete user?')) return;
        await api('/api/users/' + b.dataset.delUser, { method: 'DELETE' });
        await refreshAll();
        render();
      };
    });
    document.querySelectorAll('[data-del-dept]').forEach((b) => {
      b.onclick = async () => {
        if (!confirm('Delete department?')) return;
        await api('/api/departments/' + b.dataset.delDept, { method: 'DELETE' });
        await refreshAll();
        render();
      };
    });

      const name = prompt('Project name (e.g. Mira Dev, BHQ)?'); if (!name) return;
      try {
        await api('/api/projects', { method: 'POST', body: { name } });
        await refreshAll();
        render();
      } catch (e) { alert(e.message); }
    };
    document.querySelectorAll('[data-del-project]').forEach((b) => {
      b.onclick = async () => {
        if (!confirm('Delete project?')) return;
        await api('/api/projects/' + b.dataset.delProject, { method: 'DELETE' });
        await refreshAll();
        render();
      };
    });
  }

  function bindAdminUserModal() {
    document.getElementById('closeUserModal').onclick = () => { state.modalOpen = null; render(); };
    document.getElementById('cancelUser').onclick = () => { state.modalOpen = null; render(); };
    document.getElementById('saveUser').onclick = async () => {
      const name = document.getElementById('uName').value.trim();
      const email = document.getElementById('uEmail').value.trim();
      const role = document.getElementById('uRole').value;
      const departmentId = document.getElementById('uDept').value || null;
      const errEl = document.getElementById('uErr');
      errEl.style.display = 'none';
      try {
        if (state.editingUserId) {
          const reset = document.getElementById('uReset').checked;
          const r = await api('/api/users/' + state.editingUserId, { method: 'PATCH', body: { name, email, role, departmentId, resetPasscode: reset } });
          if (r.newPasscode) {
            state.modalOpen = null; render();
            state.flash = `<h2 style="margin-top:0">Passcode reset</h2><p>New passcode for <b>${esc(r.user.name)}</b>:</p><div class="copy-pill" style="font-size: 18px; padding: 10px 16px;">${r.newPasscode}</div><p class="card-meta" style="margin-top: 12px;">Share this once — it won't be shown again.</p>`;
          } else {
            state.modalOpen = null;
          }
          await refreshAll();
          render();
        } else {
          const passcode = document.getElementById('uPasscode').value.trim();
          const r = await api('/api/users', { method: 'POST', body: { name, email, role, departmentId, passcode } });
          state.modalOpen = null;
          await refreshAll();
          state.flash = `<h2 style="margin-top:0">User created</h2><p>Initial passcode for <b>${esc(r.user.name)}</b>:</p><div class="copy-pill" style="font-size: 18px; padding: 10px 16px;">${r.initialPasscode}</div><p class="card-meta" style="margin-top: 12px;">Share this once — they can change it in their profile.</p>`;
          render();
        }
      } catch (e) {
        errEl.textContent = e.message; errEl.style.display = 'block';
      }
    };
  }

  // ─── Go ───
  boot();
  </script>
